// Helper: build a React component from a Lucide icon name
function makeIcon(name) {
  return function LucideIcon(props) {
    const ref = React.useRef(null);
    React.useEffect(() => {
      if (ref.current && window.lucide) {
        ref.current.innerHTML = '';
        const el = document.createElement('i');
        el.setAttribute('data-lucide', name.replace(/([a-z])([A-Z])/g, '$1-$2').toLowerCase());
        ref.current.appendChild(el);
        window.lucide.createIcons({ attrs: {
          'stroke-width': props.strokeWidth || 2,
          'width': 'inherit', 'height': 'inherit'
        }});
      }
    });
    const { className = '', style = {}, strokeWidth, fill, ...rest } = props;
    return <span ref={ref} className={'inline-flex items-center justify-center ' + className} style={{ width: '1em', height: '1em', ...style }} />;
  };
}

                  <button
                    onClick={() => setActiveView('ideas')}
                    className="px-6 py-3 bg-[#1a1410] text-[#f5efe3] font-mono text-xs uppercase tracking-[0.2em] hover:bg-[#3d2817] transition-colors"
                  >
                    Open Idea Explorer →
                  </button>
                </div>
              ) : (
                <div className="grid lg:grid-cols-5 gap-6">
                  {/* Thumbnail Preview */}
                  <div className="lg:col-span-2">
                    <div className="font-mono text-[10px] tracking-[0.25em] uppercase text-[#8b7355] mb-3">Episode Thumbnail Preview</div>
                    <div className="relative aspect-video bg-gradient-to-br from-[#1a1410] via-[#3d2817] to-[#8b3a1f] overflow-hidden shadow-[0_20px_40px_-12px_rgba(26,20,16,0.5)]">
                      {/* Texture */}
                      <div className="absolute inset-0 grain opacity-30" />
                      {/* Big icon */}
                      <div className="absolute -right-8 -bottom-8 opacity-20">
                        {(() => { const Icon = selectedIdea.icon; return <Icon className="w-48 h-48 text-[#c9a961]" strokeWidth={0.5} />; })()}
                      </div>
                      {/* Content */}
                      <div className="absolute inset-0 p-6 flex flex-col justify-between">
                        <div className="flex items-center justify-between">
                          <div className="flex items-center gap-2">
                            <div className="w-2 h-2 bg-[#8b3a1f] rounded-full animate-pulse" />
                            <span className="font-mono text-[10px] tracking-[0.3em] uppercase text-[#f5efe3]">Suman TV · Live</span>
                          </div>
                          <div className="font-mono text-[10px] text-[#c9a961]">EP 0{selectedIdea.id}</div>
                        </div>
                        <div>
                          <div className="font-mono text-[10px] tracking-[0.3em] uppercase text-[#c9a961] mb-2">Alternative Career</div>
                          <div className="font-display text-3xl text-[#f5efe3] leading-[0.95] mb-2" style={{fontWeight:700}}>
                            ₹1 Lakh<br/>
                            <span className="italic text-[#c9a961]" style={{fontWeight:300}}>to {selectedIdea.name}</span>
                          </div>
                          <div className="text-xs text-[#f5efe3]/80">{selectedIdea.tagline}</div>
                        </div>
                      </div>
                      {/* Play button */}
                      <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-14 h-14 bg-[#f5efe3]/90 rounded-full flex items-center justify-center shadow-xl hover:scale-110 transition-transform cursor-pointer">
                        <Play className="w-5 h-5 text-[#1a1410] ml-1" fill="#1a1410" />
                      </div>
                    </div>
                    <div className="mt-3 text-[11px] text-[#8b7355] font-mono">
                      Thumbnail auto-composed from blueprint data. Export dimensions: 1920×1080.
                    </div>
                  </div>

                  {/* Script Generator */}
                  <div className="lg:col-span-3">
                    <div className="flex items-center justify-between mb-3">
                      <div className="font-mono text-[10px] tracking-[0.25em] uppercase text-[#8b7355]">Content Hook Generator</div>
                      <button
                        onClick={() => setShowScript(!showScript)}
                        className="flex items-center gap-2 px-4 py-2 bg-[#8b3a1f] text-[#f5efe3] font-mono text-[10px] uppercase tracking-[0.2em] hover:bg-[#6b2a15] transition-colors"
                      >
                        <Sparkles className="w-3.5 h-3.5" /> {showScript ? 'Regenerate' : 'Generate 30-sec Script'}
                      </button>
                    </div>
                    <div className="bg-[#1a1410] text-[#f5efe3] p-6 min-h-[420px] relative">
                      <div className="flex items-center justify-between pb-4 border-b border-[#c9a961]/20 mb-4">
                        <div className="font-mono text-[10px] tracking-[0.2em] uppercase text-[#c9a961]">
                          Script v1 · {selectedIdea.name}
                        </div>
                        <div className="font-mono text-[10px] text-[#f5efe3]/50">30s · Regional + English</div>
                      </div>
                      {showScript ? (
                        <pre className="font-mono text-xs leading-relaxed text-[#f5efe3] whitespace-pre-wrap fade-in">
                          {generateScript(selectedIdea)}
                        </pre>
                      ) : (
                        <div className="flex flex-col items-center justify-center h-[340px] text-center">
                          <Video className="w-10 h-10 text-[#c9a961]/40 mb-3" strokeWidth={1} />
                          <div className="font-display italic text-lg text-[#f5efe3]/60 mb-1" style={{fontStyle:'italic'}}>
                            Ready to turn this business into a broadcast?
                          </div>
                          <div className="text-xs text-[#f5efe3]/40">Click the generator above.</div>
                        </div>
                      )}
                    </div>
                    {showScript && (
                      <div className="mt-3 flex gap-2 text-[10px] font-mono uppercase tracking-wider text-[#8b7355]">
                        <span className="px-2 py-1 bg-[#faf7f0] hairline">#AlternativeCareer</span>
                        <span className="px-2 py-1 bg-[#faf7f0] hairline">#RuralFounder</span>
                        <span className="px-2 py-1 bg-[#faf7f0] hairline">#{selectedIdea.category.replace(/\s/g,'')}</span>
                        <span className="px-2 py-1 bg-[#faf7f0] hairline">#SumanStartup</span>
                      </div>
                    )}
                  </div>
                </div>
              )}
            </div>
          )}

          {/* ───────── ROADMAP ───────── */}
          {activeView === 'roadmap' && (
            <div className="fade-in">
              <div className="mb-8">
                <div className="font-mono text-[11px] tracking-[0.3em] uppercase text-[#8b7355] mb-2">Module 05 — Execution Roadmap</div>
                <h1 className="font-display text-5xl text-[#1a1410] leading-[0.95]" style={{fontWeight:400}}>
                  From <span className="italic" style={{fontWeight:300}}>Idea</span> to <span className="text-[#8b3a1f]" style={{fontWeight:700}}>Launch.</span>
                </h1>
                <p className="mt-4 max-w-2xl text-[#3d2817]/75 leading-relaxed text-[15px]">
                  A four-phase checklist grounded in real founder experience. Tick items as you complete them — this roadmap is yours.
                </p>
              </div>

              <div className="relative">
                {/* Vertical line */}
                <div className="absolute left-[19px] top-4 bottom-4 w-px bg-[#3d2817]/20 hidden md:block" />

                <div className="space-y-8">
                  {roadmap.map((phase, pi) => {
                    const phaseItems = phase.items;
                    const completedInPhase = phaseItems.filter((_, ii) => completedSteps[`${pi}-${ii}`]).length;
                    const phaseComplete = completedInPhase === phaseItems.length;
                    return (
                      <div key={pi} className="relative flex gap-6">
                        {/* Marker */}
                        <div className={`relative z-10 w-10 h-10 flex-shrink-0 flex items-center justify-center font-display text-sm transition-all ${
                          phaseComplete
                            ? 'bg-[#3d5a3a] text-[#f5efe3]'
                            : completedInPhase > 0
                              ? 'bg-[#c9a961] text-[#1a1410]'
                              : 'bg-[#faf7f0] hairline text-[#1a1410]'
                        }`} style={{fontWeight:700}}>
                          {phaseComplete ? <CheckCircle2 className="w-5 h-5" /> : String(pi+1).padStart(2,'0')}
                        </div>

                        {/* Content */}
                        <div className="flex-1 bg-[#faf7f0] hairline p-6">
                          <div className="flex items-center justify-between mb-4">
                            <div>
                              <div className="font-mono text-[10px] tracking-[0.25em] uppercase text-[#8b7355]">Phase {pi+1}</div>
                              <h3 className="font-display text-2xl text-[#1a1410]" style={{fontWeight:600}}>{phase.phase}</h3>
                            </div>
                            <div className="font-mono text-xs text-[#3d2817]">
                              {completedInPhase}/{phaseItems.length}
                            </div>
                          </div>

                          {/* Progress bar */}
                          <div className="h-1 bg-[#ebe4d2] mb-5">
                            <div
                              className="h-full bg-[#3d5a3a] transition-all duration-500"
                              style={{width: `${(completedInPhase/phaseItems.length)*100}%`}}
                            />
                          </div>

                          {/* Items */}
                          <div className="space-y-2">
                            {phaseItems.map((item, ii) => {
                              const key = `${pi}-${ii}`;
                              const done = !!completedSteps[key];
                              return (
                                <button
                                  key={ii}
                                  onClick={() => setCompletedSteps({...completedSteps, [key]: !done})}
                                  className={`w-full flex items-center gap-3 p-3 text-left transition-all border-l-2 ${
                                    done
                                      ? 'bg-[#e8ede4] border-[#3d5a3a]'
                                      : 'bg-transparent border-[#3d2817]/15 hover:bg-[#ebe4d2]/50 hover:border-[#8b7355]'
                                  }`}
                                >
                                  {done
                                    ? <CheckCircle2 className="w-4 h-4 text-[#3d5a3a] flex-shrink-0" strokeWidth={2} />
                                    : <Circle className="w-4 h-4 text-[#8b7355]/50 flex-shrink-0" strokeWidth={1.5} />
                                  }
                                  <span className={`text-sm ${done ? 'text-[#3d5a3a] line-through' : 'text-[#1a1410]'}`}>
                                    {item}
                                  </span>
                                </button>
                              );
                            })}
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          )}

        </main>
      </div>

      {/* ═══════════════ FOOTER ═══════════════ */}
      <footer className="border-t border-[#3d2817]/20 bg-[#1a1410] text-[#f5efe3] px-6 lg:px-10 py-6 mt-10">
        <div className="max-w-7xl mx-auto flex flex-col md:flex-row md:items-center justify-between gap-4">
          <div className="flex items-center gap-3">
            <Compass className="w-5 h-5 text-[#c9a961]" strokeWidth={1.5} />
            <div>
              <div className="font-display text-lg" style={{fontWeight:600}}>Suman Startup Advisor</div>
              <div className="font-mono text-[10px] tracking-[0.2em] uppercase text-[#c9a961]">
                A Suman TV Initiative · Hyderabad
              </div>
            </div>
          </div>
          <div className="font-display italic text-sm text-[#f5efe3]/70 max-w-md text-right" style={{fontStyle:'italic'}}>
            "Responsible and respectful content. Sustainable &amp; ethical business growth for every village, every graduate, every woman."
          </div>
        </div>
      </footer>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<SumanStartupAdvisor />);
</script>
</body>
</html>
